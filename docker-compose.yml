services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gallamitra-server
    restart: always
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
    dns:
      - 8.8.8.8
      - 1.1.1.1

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gallamitra-client
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - server

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: gallamitra-admin
    restart: always
    ports:
      - "5001:80"
    depends_on:
      - server

